services:
  postgres:
    image: postgres:16-alpine
    container_name: vendorbridge-postgres
    environment:
      POSTGRES_USER: vendorbridge
      POSTGRES_PASSWORD: vendorbridge
      POSTGRES_DB: vendorbridge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendorbridge -d vendorbridge"]
      interval: 5s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    container_name: vendorbridge-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 8

volumes:
  pgdata:

